# Backend behind Caddy (automatic HTTPS via Let's Encrypt). Used by the
# backend-deploy workflow on the EC2 host. Required in a sibling `.env` file:
#   BACKEND_IMAGE         e.g. ghcr.io/subraths/ai-tutor-backend:latest
#   BACKEND_DOMAIN        public hostname — a real domain, or <ec2-ip>.sslip.io
#   TUTOR_GEMINI_API_KEY  your Gemini key
#
# Public traffic: phone -> https://BACKEND_DOMAIN (Caddy :443) -> backend :8000.
services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/subraths/ai-tutor-backend:latest}
    container_name: tutorai-backend
    restart: unless-stopped
    # Not published to the internet — Caddy reaches it over the compose network.
    # Bound to loopback only so you can `curl localhost:8000` on the host to debug.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      TUTOR_ENVIRONMENT: prod
      TUTOR_LLM_PROVIDER: gemini
      TUTOR_TTS_PROVIDER: gemini
      TUTOR_GENERATION_ENGINE: langgraph
      TUTOR_STORAGE_BACKEND: filesystem
      TUTOR_DATA_DIR: /data
      TUTOR_GEMINI_API_KEY: ${TUTOR_GEMINI_API_KEY:?set TUTOR_GEMINI_API_KEY}
      TUTOR_GEMINI_MODEL: ${TUTOR_GEMINI_MODEL:-gemini-2.5-flash}
      TUTOR_GEMINI_TTS_MODEL: ${TUTOR_GEMINI_TTS_MODEL:-gemini-3.1-flash-tts-preview}
    volumes:
      - tutor-data:/data

  caddy:
    image: caddy:2-alpine
    container_name: tutorai-caddy
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      BACKEND_DOMAIN: ${BACKEND_DOMAIN:?set BACKEND_DOMAIN (a real domain or <ec2-ip>.sslip.io)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # persisted certs — survives redeploys, avoids ACME rate limits
      - caddy-config:/config

volumes:
  tutor-data:
  caddy-data:
  caddy-config:
