name: backend-deploy

# Builds the backend image, pushes it to GHCR, then deploys it on the EC2 host.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags (lowercase)
        id: meta
        run: |
          IMG="ghcr.io/${{ github.repository }}-backend"
          IMG="${IMG,,}"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$IMG:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$IMG:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE="${{ needs.build-push.outputs.image }}:latest"
            docker pull "$IMAGE"
            docker rm -f tutorai-backend 2>/dev/null || true
            docker run -d --name tutorai-backend --restart unless-stopped \
              -p 8000:8000 \
              -e TUTOR_ENVIRONMENT=prod \
              -e TUTOR_LLM_PROVIDER=gemini \
              -e TUTOR_TTS_PROVIDER=gemini \
              -e TUTOR_GENERATION_ENGINE=langgraph \
              -e TUTOR_STORAGE_BACKEND=filesystem \
              -e TUTOR_DATA_DIR=/data \
              -e TUTOR_GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}' \
              -v tutor-data:/data \
              "$IMAGE"
            docker image prune -f
