name: backend-deploy

# Builds the backend image, pushes it to GHCR, then deploys it on the EC2 host.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags (lowercase)
        id: meta
        run: |
          IMG="ghcr.io/${{ github.repository }}-backend"
          IMG="${IMG,,}"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$IMG:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$IMG:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ship the compose file + Caddyfile so the host runs from repo source.
      - name: Copy compose + Caddyfile to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/docker-compose.yml,backend/Caddyfile"
          target: tutorai
          strip_components: 1

      - name: Deploy with docker compose (backend + Caddy/HTTPS)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/tutorai
            # Compose auto-loads this .env (kept out of the image; host-local).
            cat > .env <<EOF
            BACKEND_IMAGE=${{ needs.build-push.outputs.image }}:latest
            BACKEND_DOMAIN=${{ secrets.BACKEND_DOMAIN }}
            TUTOR_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            EOF
            chmod 600 .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Remove a pre-compose standalone container from the old `docker run` deploy.
            docker rm -f tutorai-backend 2>/dev/null || true
            docker compose pull
            docker compose up -d
            docker image prune -f
